{% extends "base.html" %}

{% block title %}
Edit Product
{% endblock %}

{% block content %}

<h2 class="page-title">Edit Product</h2>

<div class="card">
<div class="card-body">

<form method="POST">

<div class="mb-3">
<label>Product Name</label>
<input type="text" name="product_name"
class="form-control"
value="{{ product[1] }}" required>
</div>

<div class="mb-3">
<label>Category</label>
<input type="text" name="category"
class="form-control"
value="{{ product[2] }}" required>
</div>

<div class="mb-3">
<label>Brand</label>
<input type="text" name="brand"
class="form-control"
value="{{ product[3] }}">
</div>

<div class="mb-3">
<label>Fabric</label>
<input type="text" name="fabric"
class="form-control"
value="{{ product[4] }}">
</div>

<div class="mb-3">
<label>Cost Price</label>
<input type="number" step="0.01"
name="cost_price"
class="form-control"
value="{{ product[5] }}">
</div>

<div class="mb-3">
<label>Selling Price</label>
<input type="number" step="0.01"
name="selling_price"
class="form-control"
value="{{ product[6] }}">
</div>

<div class="mb-3">
<label>GST</label>
<input type="number" step="0.01"
name="gst"
class="form-control"
value="{{ product[7] }}">
</div>

<button class="btn btn-success">
    Update Product
</button>

<a href="/products" class="btn btn-secondary">
    Cancel
</a>

</form>

</div>
</div>

{% endblock %}

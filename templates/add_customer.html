{% extends "base.html" %}

{% block title %}
Add Customer
{% endblock %}

{% block content %}

<div class="container mt-5">

<h2>Add Customer</h2>

<form method="POST">

<div class="mb-3">

<label>Name</label>

<input
type="text"
name="customer_name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Mobile</label>

<input
type="text"
name="mobile"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control">

</div>

<div class="mb-3">

<label>City</label>

<input
type="text"
name="city"
class="form-control">

</div>

<div class="mb-3">

<label>Customer Type</label>

<select
name="customer_type"
class="form-control">

<option>Retail</option>

<option>Wholesale</option>

</select>

</div>

<button class="btn btn-success">

Save Customer

</button>

<a href="/customers"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

{% endblock %}

{% extends "base.html" %}

{% block title %}
Edit Customer
{% endblock %}

{% block content %}

<div class="container mt-5">

<h2>Edit Customer</h2>

<form method="POST">

<div class="mb-3">
<label>Name</label>

<input
type="text"
name="customer_name"
class="form-control"
value="{{ customer[1] }}"
required>

</div>

<div class="mb-3">

<label>Mobile</label>

<input
type="text"
name="mobile"
class="form-control"
value="{{ customer[2] }}"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
value="{{ customer[3] }}">

</div>

<div class="mb-3">

<label>City</label>

<input
type="text"
name="city"
class="form-control"
value="{{ customer[4] }}">

</div>

<div class="mb-3">

<label>Customer Type</label>

<select
name="customer_type"
class="form-control">

<option {% if customer[5]=="Retail" %}selected{% endif %}>
Retail
</option>

<option {% if customer[5]=="Wholesale" %}selected{% endif %}>
Wholesale
</option>

</select>

</div>

<button class="btn btn-success">

Update Customer

</button>

<a href="/customers" class="btn btn-secondary">

Cancel

</a>

</form>

</div>

{% endblock %}

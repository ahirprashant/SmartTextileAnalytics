{% extends "base.html" %}

{% block title %}Add Inventory{% endblock %}

{% block content %}

<div class="container">

<h2 class="page-title">Add Inventory</h2>

<div class="card p-4">

<form method="POST">

<label>Product</label>

<select class="form-select" name="product_id" required>

{% for p in products %}

<option value="{{p[0]}}">

{{p[1]}}

</option>

{% endfor %}

</select>

<br>

<label>Stock</label>

<input
type="number"
class="form-control"
name="stock"
required>

<br>

<label>Reorder Level</label>

<input
type="number"
class="form-control"
name="reorder_level"
required>

<br>

<label>Warehouse</label>

<input
type="text"
class="form-control"
name="warehouse"
required>

<br>

<button class="btn btn-primary">

Save

</button>

<a href="/inventory"
class="btn btn-secondary">

Back

</a>

</form>

</div>

</div>

{% endblock %}

{% extends "base.html" %}

{% block title %}
Add Product
{% endblock %}

{% block content %}

<h2 class="page-title">Add Product</h2>

<div class="card">

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Product Name</label>

<input
type="text"
name="product_name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Category</label>

<input
type="text"
name="category"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Brand</label>

<input
type="text"
name="brand"
class="form-control">

</div>

<div class="mb-3">

<label>Fabric</label>

<input
type="text"
name="fabric"
class="form-control">

</div>

<div class="mb-3">

<label>Cost Price</label>

<input
type="number"
step="0.01"
name="cost_price"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Selling Price</label>

<input
type="number"
step="0.01"
name="selling_price"
class="form-control"
required>

</div>

<div class="mb-3">

<label>GST (%)</label>

<input
type="number"
step="0.01"
name="gst"
class="form-control"
required>

</div>

<button class="btn btn-success">
    Save Product
</button>

<a href="/products" class="btn btn-secondary">
    Cancel
</a>

</form>

</div>

</div>

{% endblock %}
